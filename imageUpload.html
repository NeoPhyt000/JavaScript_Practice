<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<style>

    *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        html, body{
            width: 100%;
            height: 100%;
        }

        #main{
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background-color: #999;
        }

        input{
            display: none;
        }

        #btn{
            padding: 12px 22px;
            background-color: rgb(47, 121, 47);
            color: white;
            border-radius: 5px;
        }

        #main #btn:hover{
            background-color: rgb(4, 85, 4);
        }
 

</style>
</head>
<body>
    <div id="main">
        <input id="fileinp" type="file">
        <div id="btn">
            Upload File
        </div>
    </div>

<Script>
    let btn = document.querySelector("#btn");
    let fileinp = document.querySelector("#fileinp");

    btn.addEventListener("click", function(){
        fileinp.click();
    })
    fileinp.addEventListener("change", function(details){
        const file = details.target.files[0];
        if(file) {
            btn.textContent = file.name;
        }
    })

</Script>
</body>
</html>

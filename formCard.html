<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        html, body{
            width: 100%;
            height: 100%;
            background-color: darkgrey;
        }

        input {
            display: block;
        }

        #main{
            padding: 50px;
            width: 100%;
            height: 100%;
            background-color: darkgrey;
        }

        .card{
            max-width: 300px;
            margin-top: 10px;
            border-radius: 5px;
            display: inline-block;
            padding: 20px;
            border: 1px solid #555;
            
        }

        .profile{
            width: 50px;
            height: 50px;
            color: white;
            border-radius: 40% ;
            margin-bottom: 7px;
            overflow: hidden;
        }

        .profile img{
            height: 100%;
            width: 100%;
            object-fit: cover;

        }

        .card h5{
            margin-top: 10px;
        }

        .card p{
            font-size: 12px;
            margin-top: 10px;
        }
</style>
</head>
<body>
    <div id="main">
        <form action="">
        <input type="text" placeholder="Upload Image">
        <input type="text" placeholder="Name">
        <input type="text" placeholder="Occupation">
        <input type="text" placeholder="Info">
        <input type="submit">
    </form>

        </div>

    </div>
    </div>

        let form = document.querySelector("form");

        form.addEventListener("submit", (details) => {

        })

</body>
</html>
